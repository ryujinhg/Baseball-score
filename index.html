<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学野球スコア速報</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 電光掲示板風のダークモードデザイン */
        body {
            background-color: #111111;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        /* 📸 画像として撮影するエリアのまとまり */
        #capture-area {
            background-color: #111111;
            padding: 10px;
            border-radius: 6px;
        }

        /* 🛠 試合情報エリア（1列3行 ＋ 右側にクリアボタン） */
        .match-info-container {
            display: flex;
            background-color: #222222;
            border-left: 5px solid #ff9900;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            align-items: center;
            justify-content: space-between;
        }
        .match-info-inputs {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
        }
        .match-info-row {
            font-size: 14px;
            display: flex;
            align-items: center;
        }
        .match-info-row input[type="text"] {
            flex-grow: 1;
        }

        /* 🛠 右上の小さなクリアボタン設定 */
        .clear-box-top {
            padding-left: 10px;
        }
        .btn-clear-mini {
            background-color: #331111;
            color: #ff4444;
            border: 1px solid #ff4444;
            border-radius: 4px;
            width: 32px;
            height: 32px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            box-sizing: border-box;
        }
        .btn-clear-mini:active {
            background-color: #551111;
        }

        /* 入力欄の基本スタイル */
        input[type="text"], input[type="date"], select {
            background-color: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
            padding: 2px 4px;
            border-radius: 4px;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            background-color: #333333;
            outline: 1px solid #ff9900;
        }
        select {
            cursor: pointer;
            border-bottom: 1px dashed #555555;
            color: #ccff00;
            padding-right: 2px;
            text-align: center;
        }

        /* スコアボードのテーブル */
        .scoreboard {
            width: 100%;
            border-collapse: collapse;
            background-color: #000000;
            border: 2px solid #333333;
            text-align: center;
            margin-bottom: 20px;
            table-layout: fixed;
        }
        
        .scoreboard th, .scoreboard td {
            border: 1px solid #333333;
            padding: 8px 0;
            box-sizing: border-box;
        }
        
        .scoreboard th {
            background-color: #222222;
            color: #aaaaaa;
            font-size: 11px;
        }
        
        .scoreboard .team-name-header,
        .scoreboard .team-name-cell {
            width: 34%;
            text-align: left;
            padding: 0;
        }
        
        .scoreboard .team-name-cell {
            height: 48px;
        }
        
        .team-div-input {
            width: 100%;
            height: 48px;
            box-sizing: border-box;
            padding: 0 3px;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            outline: none;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .team-div-input:focus {
            background-color: #333333;
            box-shadow: inset 0 0 0 1px #ff9900;
        }
        .team-div-input:empty:before {
            content: attr(placeholder);
            color: #555555;
        }

        .scoreboard th.ext-header {
            color: #ff9900;
            cursor: pointer;
            background-color: #222222;
            font-weight: bold;
        }
        .scoreboard th.ext-header.active-ext {
            background-color: #2a2a2a;
            border-bottom: 2px solid #ff9900;
        }
        
        .scoreboard td {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
            position: relative;
            user-select: none;
        }

        .inning-score, .scoreboard th:not(.team-name-header):not(.total-header), .scoreboard .total-score {
            width: 6%;
        }
        
        .scoreboard .total-score {
            color: #ff3300;
            font-size: 20px;
            background-color: #111111;
        }

        .score-text {
            display: inline-block;
            min-width: 12px;
            min-height: 20px;
        }

        .inning-score {
            cursor: pointer;
        }
        .inning-score.active {
            background-color: #222222;
            outline: 2px solid #ff9900;
        }

        .score-stepper {
            display: none;
            position: absolute;
            left: 50%;
            top: 100%;
            transform: translateX(-50%);
            background-color: #333333;
            border: 1px solid #555555;
            border-radius: 4px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            flex-direction: row;
        }
        .inning-score.active .score-stepper {
            display: flex;
        }
        .score-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .score-btn:active {
            background-color: #555555;
        }
        .score-btn.up { color: #ffcc00; }
        .score-btn.down { color: #ff3300; border-left: 1px solid #444444; }

        /* バッテリー情報エリア */
        .battery-box {
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .battery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333333;
            padding-bottom: 5px;
            margin-bottom: 12px;
        }
        .battery-box h3 {
            margin: 0;
            font-size: 15px;
            color: #ff9900;
        }

        .battery-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .battery-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.4;
            padding-left: 10px;
            border-left: 3px solid #ffcc00;
        }
        .battery-inputs {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }
        .battery-row-line {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .inn-label {
            color: #aaaaaa;
            font-size: 13px;
        }
        .player-input {
            width: 80px;
            border-bottom: 1px solid #444444 !important;
            text-align: center;
        }

        /* 🛠 下部のアクションボタン（押しやすい2列並びに戻しました） */
        .action-box {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 15px;
        }
        .share-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .share-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.4);
        }
        .btn-create {
            background-color: #ff9900;
            color: #000000;
        }
        .btn-capture {
            background-color: #111111;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            box-sizing: border-box;
        }

        /* テキスト確認＆LINE送信エリア */
        .debug-box {
            background-color: #222222;
            border: 1px dashed #555555;
            border-radius: 6px;
            padding: 12px;
            margin-top: 15px;
        }
        .debug-box h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: #aaaaaa;
        }
        .confirm-container {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        .debug-textarea {
            flex: 2;
            height: 85px;
            background-color: #111111;
            color: #00ffcc;
            border: 1px solid #333333;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
            padding: 8px;
            border-radius: 4px;
            resize: none;
        }
        .btn-line-send {
            flex: 1;
            background-color: #06C755;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-line-send:active {
            background-color: #05b34c;
        }
        .btn-line-send span.icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="capture-area">
        <div class="match-info-container">
            <div class="match-info-inputs">
                <div class="match-info-row">
                    <span onclick="document.getElementById('match-date').showPicker();" style="cursor: pointer; font-size: 16px; margin-right: 5px;">📅</span> 
                    <input type="date" id="match-date" onclick="this.showPicker();"> 
                </div>
                <div class="match-info-row">
                    <span style="margin-right: 5px;">🏆</span>
                    <input type="text" id="match-title" value="" placeholder="大会名を入力">
                </div>
                <div class="match-info-row">
                    <span style="margin-right: 5px;">📍</span>
                    <input type="text" id="match-location" value="" placeholder="球場名を入力">
                </div>
            </div>
            <div class="clear-box-top">
                <button class="btn-clear-mini" id="clear-all-btn" title="試合データを全クリア">♻️</button>
            </div>
        </div>

        <table class="scoreboard">
            <thead>
                <tr>
                    <th class="team-name-header">チーム</th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th>
                    <th class="ext-header" data-num="8"></th>
                    <th class="ext-header" data-num="9"></th>
                    <th class="ext-header" data-num="10"></th>
                    <th class="total-header" style="color: #ff3300;">R</th>
                </tr>
            </thead>
            <tbody>
                <tr class="team-row">
                    <td class="team-name-cell">
                        <div class="team-div-input" contenteditable="true" placeholder="先攻チーム"></div>
                    </td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="total-score"></td>
                </tr>
                <tr class="team-row">
                    <td class="team-name-cell">
                        <div class="team-div-input" contenteditable="true" placeholder="後攻チーム"></div>
                    </td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="inning-score"><span class="score-text"></span></td>
                    <td class="total-score"></td>
                </tr>
            </tbody>
        </table>

        <div class="battery-box">
            <div class="battery-header">
                <h3>⚾ バッテリー情報</h3>
            </div>
            <ul class="battery-list" id="battery-container">
                </ul>
        </div>
    </div>

    <div class="action-box">
        <button class="share-btn btn-create" id="line-share-btn">📋 速報テキストを作成</button>
        <button class="share-btn btn-capture" id="capture-btn">📸 画像として保存</button>
    </div>

    <div class="debug-box">
        <h4>📋 生成テキスト確認（OKなら右のボタンへ！）</h4>
        <div class="confirm-container">
            <textarea class="debug-textarea" id="debug-output" readonly placeholder="上の「速報テキストを作成」を押すと、ここに送信文字が表示されます。"></textarea>
            <button class="btn-line-send" id="send-to-line-btn">
                <div>この文字を<br>LINEで送る</div>
            </button>
        </div>
    </div>

    <div id="stepper-template" style="display: none;">
        <div class="score-stepper">
            <button class="score-btn up">▲</button>
            <button class="score-btn down">▼</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inningCells = document.querySelectorAll('.inning-score');
            const stepperTemplate = document.getElementById('stepper-template').innerHTML;
            const batteryContainer = document.getElementById('battery-container');

            const numOptions = `
                <option value="">-</option><option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option>
                <option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="TB">TB</option>
            `;

            function addBatteryRow(startNum="", endNum="", pitcherVal="", catcherVal="") {
                const li = document.createElement('li');
                li.classList.add('battery-item');
                li.innerHTML = `
                    <div class="battery-inputs">
                        <div class="battery-row-line inn-label">
                            ▼ <select class="start-num">${numOptions}</select>回 〜 <select class="end-num">${numOptions}</select>回
                        </div>
                        <div class="battery-row-line">
                            P <input type="text" class="player-input" value="${pitcherVal}" placeholder="投手名">
                            / C <input type="text" class="player-input" value="${catcherVal}" placeholder="捕手名">
                        </div>
                    </div>
                `;
                li.querySelector('.start-num').value = startNum;
                li.querySelector('.end-num').value = endNum;
                
                li.querySelectorAll('input, select').forEach(el => {
                    el.addEventListener('input', saveAllData);
                });

                batteryContainer.appendChild(li);
            }

            // 【LocalStorage機能】データの保存処理
            function saveAllData() {
                const data = {
                    date: document.getElementById('match-date').value,
                    title: document.getElementById('match-title').value,
                    location: document.getElementById('match-location').value,
                    teams: [],
                    scores: [],
                    extHeaders: [],
                    battery: []
                };

                document.querySelectorAll('.team-div-input').forEach(el => {
                    data.teams.push(el.textContent.trim());
                });

                document.querySelectorAll('.team-row').forEach((row, rIdx) => {
                    data.scores[rIdx] = [];
                    row.querySelectorAll('.score-text').forEach(cell => {
                        data.scores[rIdx].push(cell.textContent.trim());
                    });
                });

                document.querySelectorAll('.ext-header').forEach(el => {
                    data.extHeaders.push({
                        text: el.textContent,
                        active: el.classList.contains('active-ext'),
                        color: el.style.color
                    });
                });

                document.querySelectorAll('.battery-item').forEach(item => {
                    data.battery.push({
                        start: item.querySelector('.start-num').value,
                        end: item.querySelector('.end-num').value,
                        pitcher: item.querySelectorAll('.player-input')[0].value,
                        catcher: item.querySelectorAll('.player-input')[1].value
                    });
                });

                localStorage.setItem('bb_score_app_data', JSON.stringify(data));
            }

            // 【LocalStorage機能】データの復元処理
            function loadAllData() {
                const raw = localStorage.getItem('bb_score_app_data');
                if (!raw) {
                    const today = new Date();
                    const yyyy = today.getFullYear();
                    const mm = String(today.getMonth() + 1).padStart(2, '0');
                    const dd = String(today.getDate()).padStart(2, '0');
                    document.getElementById('match-date').value = `${yyyy}-${mm}-${dd}`;
                    addBatteryRow("1", "", "", "");
                    return;
                }

                const data = JSON.parse(raw);
                document.getElementById('match-date').value = data.date || "";
                document.getElementById('match-title').value = data.title || "";
                document.getElementById('match-location').value = data.location || "";

                document.querySelectorAll('.team-div-input').forEach((el, idx) => {
                    if (data.teams && data.teams[idx]) el.textContent = data.teams[idx];
                });

                document.querySelectorAll('.ext-header').forEach((el, idx) => {
                    if (data.extHeaders && data.extHeaders[idx]) {
                        el.textContent = data.extHeaders[idx].text;
                        if (data.extHeaders[idx].active) el.classList.add('active-ext');
                        el.style.color = data.extHeaders[idx].color;
                    }
                });

                document.querySelectorAll('.team-row').forEach((row, rIdx) => {
                    if (data.scores && data.scores[rIdx]) {
                        row.querySelectorAll('.score-text').forEach((cell, cIdx) => {
                            cell.textContent = data.scores[rIdx][cIdx] || "";
                        });
                    }
                    updateTotalScore(row);
                });

                batteryContainer.innerHTML = "";
                if (data.battery && data.battery.length > 0) {
                    data.battery.forEach(b => {
                        addBatteryRow(b.start, b.end, b.pitcher, b.catcher);
                    });
                } else {
                    addBatteryRow("1", "", "", "");
                }
            }

            // 延長ヘッダーのクリックイベント
            const extHeaders = document.querySelectorAll('.ext-header');
            extHeaders.forEach(header => {
                const defaultNum = header.getAttribute('data-num');
                header.addEventListener('click', () => {
                    const current = header.textContent;
                    if (current === '') {
                        header.textContent = defaultNum;
                        header.classList.add('active-ext');
                        header.style.color = '#ff9900';
                    } else if (current === defaultNum) {
                        header.textContent = 'TB';
                        header.style.color = '#ff3300';
                    } else {
                        header.textContent = '';
                        header.classList.remove('active-ext');
                    }
                    saveAllData();
                });
            });

            // スコア増減ロジック
            inningCells.forEach(cell => {
                cell.insertAdjacentHTML('beforeend', stepperTemplate);
                const scoreTextSpan = cell.querySelector('.score-text');

                cell.addEventListener('click', (e) => {
                    if (e.target.closest('.score-stepper')) return;
                    if (cell.classList.contains('active')) {
                        cell.classList.remove('active');
                    } else {
                        clearActiveCells();
                        cell.classList.add('active');
                        if (scoreTextSpan.textContent.trim() === "") {
                            scoreTextSpan.textContent = "0";
                            updateTotalScore(cell.parentElement);
                            saveAllData();
                        }
                    }
                    e.stopPropagation();
                });

                cell.querySelector('.score-btn.up').addEventListener('click', (e) => {
                    let currentScore = parseInt(scoreTextSpan.textContent.trim()) || 0;
                    scoreTextSpan.textContent = currentScore + 1;
                    updateTotalScore(cell.parentElement);
                    saveAllData();
                    e.stopPropagation();
                });

                cell.querySelector('.score-btn.down').addEventListener('click', (e) => {
                    let currentScore = parseInt(scoreTextSpan.textContent.trim()) || 0;
                    if (currentScore > 0) {
                        scoreTextSpan.textContent = currentScore - 1;
                    } else {
                        scoreTextSpan.textContent = "";
                    }
                    updateTotalScore(cell.parentElement);
                    saveAllData();
                    e.stopPropagation();
                });
            });

            document.addEventListener('click', () => { clearActiveCells(); });
            function clearActiveCells() { inningCells.forEach(c => c.classList.remove('active')); }

            function updateTotalScore(row) {
                const scoreTexts = row.querySelectorAll('.score-text');
                let total = 0;
                let hasScore = false;
                scoreTexts.forEach(t => {
                    const text = t.textContent.trim();
                    if (text !== "") { total += parseInt(text); hasScore = true; }
                });
                const totalCell = row.querySelector('.total-score');
                totalCell.textContent = hasScore ? total : "";
            }

            document.querySelectorAll('input[type="text"], input[type="date"]').forEach(input => {
                input.addEventListener('input', saveAllData);
            });
            document.querySelectorAll('.team-div-input').forEach(div => {
                div.addEventListener('input', saveAllData);
            });

            // 🛠 【最上部右側】全クリア機能
            document.getElementById('clear-all-btn').addEventListener('click', () => {
                if (confirm('現在の試合スコアやチーム名をすべて消去して、新しく作り直しますか？')) {
                    localStorage.removeItem('bb_score_app_data');
                    window.location.reload();
                }
            });

            // テキスト生成
            document.getElementById('line-share-btn').addEventListener('click', () => {
                const rows = document.querySelectorAll('.scoreboard tbody tr');
                const headers = document.querySelectorAll('.scoreboard thead th');
                if (rows.length < 2) return;

                const buildTeamLine = (row) => {
                    let teamName = row.querySelector('.team-div-input').textContent.trim();
                    if (!teamName) teamName = "チーム";
                    let shortName = teamName.substring(0, 3);
                    while (shortName.length < 3) { shortName += " "; }

                    const scoreCells = row.querySelectorAll('.inning-score');
                    let scoresString = "";
                    
                    scoreCells.forEach((cell, index) => {
                        const headerText = headers[index + 1].textContent;
                        if (index < 7 || headerText !== '') {
                            const score = cell.querySelector('.score-text').textContent.trim();
                            if (score !== "") {
                                let sNum = parseInt(score);
                                if (headerText === 'TB') {
                                    scoresString += "TB" + sNum;
                                } else {
                                    scoresString += (sNum < 10) ? " " + sNum : sNum;
                                }
                            } else {
                                scoresString += "--";
                            }
                        }
                    });
                    let total = row.querySelector('.total-score').textContent.trim();
                    let totalStr = total !== "" ? ` [${parseInt(total)}]` : " [0]";
                    return `${shortName} ${scoresString}${totalStr}`;
                };

                const team1Line = buildTeamLine(rows[0]);
                const team2Line = buildTeamLine(rows[1]);

                const batteryItems = document.querySelectorAll('.battery-item');
                let batteryLine = "";
                if (batteryItems.length > 0) {
                    const lastItem = batteryItems[batteryItems.length - 1];
                    const startNum = lastItem.querySelector('.start-num').value;
                    const endNum = lastItem.querySelector('.end-num').value;
                    let pitcher = lastItem.querySelectorAll('.player-input')[0].value.trim();
                    let catcher = lastItem.querySelectorAll('.player-input')[1].value.trim();
                    if (!pitcher) pitcher = "？？";
                    if (!catcher) catcher = "？？";
                    let innStr = startNum ? `${startNum}` : " ";
                    innStr += endNum ? `-${endNum}回` : "回";
                    batteryLine = `${innStr} P${pitcher} C${catcher}`;
                }

                document.getElementById('debug-output').value = `${team1Line}\n${team2Line}\n${batteryLine}`;
            });

            // LINE送信
            document.getElementById('send-to-line-btn').addEventListener('click', () => {
                const textToSend = document.getElementById('debug-output').value;
                if (!textToSend) { alert('先に「速報テキストを作成」を押してください！'); return; }
                window.open("https://line.me/R/share?text=" + encodeURIComponent(textToSend), '_blank');
            });

            // 画像保存
            document.getElementById('capture-btn').addEventListener('click', () => {
                const target = document.getElementById('capture-area');
                const inputs = target.querySelectorAll('input');
                inputs.forEach(input => input.setAttribute('value', input.value));
                
                html2canvas(target, {
                    backgroundColor: '#111111',
                    scale: 2,
                    logging: false
                }).then(canvas => {
                    const image = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    const today = document.getElementById('match-date').value || 'game';
                    link.download = `score_${today}.png`;
                    link.href = image;
                    link.click();
                }).catch(err => {
                    alert('画像の保存に失敗しました。');
                });
            });

            loadAllData();
        });
    </script>
</body>
</html>
